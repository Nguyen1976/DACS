syntax = "proto3";

package notification;

service NotificationGrpcService {
  rpc createNotification (createNotificationRequest) returns (createNotificationResponse) {}
  rpc getNotifications (GetNotificationsRequest) returns (GetNotificationsResponse) {}
  rpc markNotificationAsRead (MarkNotificationAsReadRequest) returns (MarkNotificationAsReadResponse) {}
  rpc markAllNotificationsAsRead (MarkAllNotificationsAsReadRequest) returns (MarkAllNotificationsAsReadResponse) {}
}

message createNotificationRequest {
  string inviterId = 1;
  string inviteeName = 2;
  string message = 3;
  string type = 4;
}

message createNotificationResponse {
  string id = 1;
  string userId = 2;
  string message = 3;
  bool isRead = 4;
  string type = 5;
  string createdAt = 6;
}


message Notification {
  string id = 1;
  string user_id = 2;
  string message = 3;
  bool is_read = 4;
  string type = 5;
  optional string friendRequestId = 6;
  string createdAt = 7;
}

message GetNotificationsRequest {
  string userId = 1;
  string page = 2;
  string limit = 3;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
}

message MarkNotificationAsReadRequest {
  string userId = 1;
  string notificationId = 2;
}

message MarkNotificationAsReadResponse {
  bool success = 1;
}

message MarkAllNotificationsAsReadRequest {
  string userId = 1;
}

message MarkAllNotificationsAsReadResponse {
  bool success = 1;
  int32 updatedCount = 2;
}